# 全域設定檔
# 所有戰鬥共用此設定，調整這裡的常數即可微調戰鬥手感

# 隨機種子：相同 seed + 相同輸入 → 結果完全一致
# 改變 seed 可看到「同樣對戰、不同運氣」的結果
seed: 20260503

# 減傷比例的上下限（獨立夾值，套用於 mitigation_A 與 mitigation_B）
# 上限 0.9：強勢方天花板，確保至少能打出 10% 戰力的傷害
# 下限 0.1：弱勢方保底，確保至少擋掉 10% 傷害
mitigation:
  min: 0.10
  max: 0.90

# 穩定度上限：手下個別 stability 的合法範圍上限
# 即使企劃設定 1.5，計算時也會夾到此值
stability_max: 0.99

# 戰報格式：標準 = 完整呈現各階段細節；簡略 = 只呈現結果
report_style: standard
